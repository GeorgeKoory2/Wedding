  <main class="home-main">
    <header class="hero">
      <div class="ornament top-ornament">— ✦ —</div>
      <p class="hero-eyebrow">Celebrate with us!</p>
      <h1 class="hero-title">
        <span class="name bride">Mike</span>
        <span class="ampersand">&amp;</span>
        <span class="name groom">Zuka</span>
      </h1>
      <div class="hero-divider">
        <span class="hero-divider-line"></span>
        <svg class="hero-divider-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4C9 4 6 6.5 6 9.5c0 4.5 6 10.5 6 10.5s6-6 6-10.5C18 6.5 15 4 12 4z" fill="currentColor" opacity="0.9"/>
        </svg>
        <span class="hero-divider-line"></span>
      </div>
      <p class="hero-subtitle">Share your memories with us</p>
    </header>

    <section class="action-grid">
      <a href="/camera" class="action-card camera-card">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 14l4-6h8l4 6h6a2 2 0 012 2v20a2 2 0 01-2 2H10a2 2 0 01-2-2V16a2 2 0 012-2h6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="24" cy="26" r="6" stroke="currentColor" stroke-width="2"/>
            <circle cx="24" cy="26" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="card-label">Camera</span>
        <span class="card-hint">Take a photo or video</span>
      </a>

      <a href="/upload" class="action-card upload-card">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 32V16M24 16l-6 6M24 16l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 34a8 8 0 01-1.6-15.84A12 12 0 1134 24h2a6 6 0 010 12H12z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="card-label">Upload</span>
        <span class="card-hint">Share from your camera roll</span>
      </a>
    </section>

    <a href="/my-memories" class="btn-my-memories">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="13" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="3" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <rect x="13" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      View your uploaded memories
    </a>

    <p class="privacy-note">
      Your photos and videos are private —<br/>only viewable by the couple.
    </p>

    <footer class="home-footer">
      <p>With love &amp; gratitude ✦</p>
      <div class="signature-wrap" id="sigWrap">
        <span class="signature-by">by</span>
        <div class="sig-hold-wrap">
          <svg class="sig-progress" viewBox="0 0 44 44" id="sigRing">
            <circle cx="22" cy="22" r="20" stroke="transparent" stroke-width="2" fill="none"/>
            <circle cx="22" cy="22" r="20" class="sig-ring-track" stroke-width="2" fill="none"
                    stroke-dasharray="125.6" stroke-dashoffset="125.6" id="sigRingFill"/>
          </svg>
          <img src="/static/img/signature.png" alt="" class="home-signature" id="sigImg"
               draggable="false" oncontextmenu="return false"/>
        </div>
      </div>
    </footer>
  </main>

  <script src="/static/js/main.js"></script>
  <script>
    (function() {
      var el = document.getElementById('sigImg');
      var ring = document.getElementById('sigRingFill');
      var HOLD = 7000;
      var timer = null, start = null, raf = null;

      function tick() {
        var pct = Math.min((Date.now() - start) / HOLD, 1);
        var offset = 125.6 * (1 - pct);
        ring.style.strokeDashoffset = offset;
        if (pct < 1) {
          raf = requestAnimationFrame(tick);
        } else {
          cancel();
          window.location.href = '/gallery';
        }
      }

      function begin(e) {
        e.preventDefault();
        if (timer) return;
        start = Date.now();
        ring.style.stroke = 'var(--gold)';
        raf = requestAnimationFrame(tick);
      }

      function cancel() {
        if (raf) cancelAnimationFrame(raf);
        raf = null; timer = null; start = null;
        ring.style.strokeDashoffset = 125.6;
        ring.style.stroke = 'transparent';
      }

      el.addEventListener('mousedown', begin);
      el.addEventListener('touchstart', begin, {passive: false});
      el.addEventListener('mouseup', cancel);
      el.addEventListener('mouseleave', cancel);
      el.addEventListener('touchend', cancel);
      el.addEventListener('touchcancel', cancel);
    })();
  </script>
</body>
</html>
